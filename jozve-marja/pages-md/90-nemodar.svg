<svg width="550" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow marker definition -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#333" />
    </marker>
  </defs>

  <style>
    .axis { stroke: #333; stroke-width: 2; fill: none; }
    .line-d { stroke: #1e40af; stroke-width: 3; fill: none; }
    .line-mr { stroke: #1e40af; stroke-width: 2.5; stroke-dasharray: 4,4; fill: none; }
    .line-mc { stroke: #dc2626; stroke-width: 3; fill: none; }
    .dashed { stroke-dasharray: 6,6; stroke: #4b5563; stroke-width: 1.5; }
    .label-p { fill: #dc2626; font-weight: bold; }
    .label-q { fill: #dc2626; font-weight: bold; }
    text { font-family: Tahoma, 'Vazirmatn', sans-serif; font-size: 14px; fill: #111827; }
    .label-blue { fill: #1e40af; font-weight: bold; }
    .label-red { fill: #dc2626; font-weight: bold; }
    .text-center { text-anchor: middle; }
  </style>

  <!-- Main graph group -->
  <g>
    <!-- Y-axis (Price - P) -->
    <line x1="70" y1="300" x2="70" y2="40" class="axis" marker-end="url(#arrow)" />
    <!-- X-axis (Quantity - Q) -->
    <line x1="70" y1="300" x2="480" y2="300" class="axis" marker-end="url(#arrow)" />

    <!-- Labels for Axes -->
    <text x="45" y="45" class="label-p">P</text>
    <text x="490" y="305" class="label-q">Q</text>

    <!-- Demand Curve (D) -->
    <line x1="70" y1="100" x2="400" y2="250" class="line-d" />
    <text x="410" y="255" class="label-blue">D</text>

    <!-- Marginal Revenue Curve (MR) -->
    <line x1="70" y1="100" x2="320" y2="327" class="line-mr" />
    <text x="330" y="340" class="label-blue">MR</text>

    <!-- Marginal Cost Curve (MC) -->
    <!-- Quadratic curve: y = -0.008*(x-140)^2 + 220 -->
    <!-- Let's write path for MC: starting at x=70, y=180; vertex at x=140, y=220; ending at x=280, y=63 -->
    <path d="M 70,181 C 90,205 115,220 140,220 C 185,220 240,160 280,63" class="line-mc" />
    <text x="290" y="60" class="label-red">MC</text>

    <!-- Intersection E (MR and MC) at x=184.5, y=204 -->
    <circle cx="184.5" cy="204" r="5" fill="#111827" />
    <text x="160" y="209" style="font-weight: bold;">E</text>

    <!-- Vertical dashed line from Qx on X-axis, through E, up to D -->
    <line x1="184.5" y1="300" x2="184.5" y2="152" class="dashed" />
    <!-- Point on Demand Curve at x=184.5, y=152 -->
    <circle cx="184.5" cy="152" r="5" fill="#111827" />

    <!-- Horizontal dashed line from D intersection to Y-axis at y=152 -->
    <line x1="70" y1="152" x2="184.5" y2="152" class="dashed" />

    <!-- Price and Quantity equilibrium labels -->
    <!-- Specific Price label on Y-axis -->
    <text x="45" y="156" class="label-red" style="font-weight: bold;">P</text>
    <!-- Specific Quantity label on X-axis -->
    <text x="184.5" y="322" class="label-blue text-center" style="font-weight: bold;">Q<tspan font-size="10" baseline-shift="sub">x</tspan></text>
  </g>
</svg>
