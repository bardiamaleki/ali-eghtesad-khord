  <path d="M 180 170 C 180 210, 420 210, 420 170" fill="none" stroke="blue" stroke-width="2" marker-end="url(#arrow-blue-right)" />
  <text x="300" y="185" font-family="Tahoma, Arial" font-size="12" text-anchor="middle" fill="blue">قیمت عامل تولید (دستمزد، بهره و ...)</text>

  <path d="M 440 170 C 440 250, 160 250, 160 170" fill="none" stroke="red" stroke-width="2" marker-end="url(#arrow-red-left)" />
