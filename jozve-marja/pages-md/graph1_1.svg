  <rect x="120" y="130" width="80" height="40" rx="20" fill="none" stroke="black" stroke-width="2" />
  <text x="160" y="155" font-family="Tahoma, Arial" font-size="14" text-anchor="middle">بنگاه</text>

  <rect x="400" y="130" width="80" height="40" rx="20" fill="none" stroke="black" stroke-width="2" />
  <text x="440" y="155" font-family="Tahoma, Arial" font-size="14" text-anchor="middle">خانوار</text>

  <path d="M 160 130 C 160 50, 440 50, 440 130" fill="none" stroke="red" stroke-width="2" marker-end="url(#arrow-red-right)" />
  <text x="300" y="50" font-family="Tahoma, Arial" font-size="12" text-anchor="middle" fill="red">کالا</text>
  <text x="80" y="70" font-family="Tahoma, Arial" font-size="12" text-anchor="middle" fill="red">بازار کالا و خدمات</text>

  <path d="M 420 130 C 420 90, 180 90, 180 130" fill="none" stroke="blue" stroke-width="2" marker-end="url(#arrow-blue-left)" />
