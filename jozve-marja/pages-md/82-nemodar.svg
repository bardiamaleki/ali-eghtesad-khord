<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .axis { stroke: black; stroke-width: 1.5; fill: none; }
    .line-blue { stroke: blue; stroke-width: 2; fill: none; }
    .line-red { stroke: red; stroke-width: 2; fill: none; }
    .dashed { stroke-dasharray: 5,5; stroke: black; fill: none; }
    text { font-family: Tahoma, sans-serif; font-size: 14px; }
  </style>

  <!-- Graph 1 -->
  <g transform="translate(60, 50)">
    <line x1="0" y1="200" x2="250" y2="200" class="axis" />
    <line x1="0" y1="200" x2="0" y2="0" class="axis" />
    <text x="-20" y="20">P</text>
    <text x="260" y="205">Q</text>
    
    <!-- S -->
    <line x1="20" y1="180" x2="180" y2="20" class="line-red" />
    <text x="190" y="25" fill="red">S</text>
    
    <!-- D -->
    <line x1="20" y1="20" x2="180" y2="180" class="line-blue" />
    <text x="190" y="185" fill="blue">D</text>
    
    <!-- Equilibrium e -->
    <circle cx="100" cy="100" r="4" fill="black" />
    <text x="110" y="95">e</text>
    
    <line x1="0" y1="100" x2="100" y2="100" class="dashed" />
    <text x="-25" y="105">P_e</text>
    <line x1="100" y1="100" x2="100" y2="200" class="dashed" />
    <text x="95" y="215">Q_e</text>
    
    <!-- P* -->
    <line x1="0" y1="50" x2="150" y2="50" class="dashed" />
    <text x="-25" y="55">P*</text>
    <text x="70" y="45" font-family="Tahoma" font-size="12" fill="red">مازاد عرضه</text>
    
    <!-- P. -->
    <line x1="0" y1="150" x2="150" y2="150" class="dashed" />
    <text x="-25" y="155">P.</text>
    <text x="70" y="170" font-family="Tahoma" font-size="12" fill="red">مازاد تقاضا</text>
  </g>

  <!-- Graph 2 -->
  <g transform="translate(370, 50)">
    <line x1="0" y1="200" x2="200" y2="200" class="axis" />
    <line x1="0" y1="200" x2="0" y2="0" class="axis" />
    <text x="-20" y="20">W</text>
    <text x="210" y="205">L</text>
    
    <!-- SL (Backward Bending) -->
    <path d="M 120 200 Q 180 150 120 50 Q 80 0 20 20" class="line-red" />
    <text x="15" y="100" fill="red">SL</text>
    
    <!-- D -->
    <line x1="30" y1="20" x2="150" y2="200" class="line-blue" />
    <text x="160" y="195" fill="blue">D</text>
    
    <!-- Equilibrium Points -->
    <circle cx="103" cy="130" r="4" fill="black" />
    <text x="115" y="130">B</text>
    
    <circle cx="56" cy="58" r="4" fill="black" />
    <text x="65" y="55">A</text>
    
    <text x="130" y="80" font-family="Tahoma" font-size="12">- تقاضا</text>
    <text x="145" y="100" font-family="Tahoma" font-size="12">+ عرضه</text>
  </g>

  <!-- Graph 3 -->
  <g transform="translate(620, 50)">
    <line x1="0" y1="200" x2="150" y2="200" class="axis" />
    <line x1="0" y1="200" x2="0" y2="0" class="axis" />
    <text x="-15" y="20">P</text>
    <text x="160" y="205">Q</text>
    
    <!-- D (curves right towards center) -->
    <path d="M 50 20 C 75 60 75 140 50 180" class="line-blue" />
    <text x="40" y="15" fill="blue">D</text>
    
    <!-- S (curves left towards center) -->
    <path d="M 90 20 C 65 60 65 140 90 180" class="line-red" />
    <text x="90" y="15" fill="red">S</text>
    
    <!-- Range lines (stop precisely at the curves) -->
    <line x1="0" y1="80" x2="72" y2="80" stroke="black" stroke-width="1" />
    <line x1="0" y1="90" x2="70" y2="90" stroke="black" stroke-width="1" />
    <line x1="0" y1="100" x2="68" y2="100" stroke="black" stroke-width="1" />
    <line x1="0" y1="110" x2="70" y2="110" stroke="black" stroke-width="1" />
    <line x1="0" y1="120" x2="72" y2="120" stroke="black" stroke-width="1" />
    
    <text x="-40" y="75" font-family="Tahoma" font-size="12">طیف</text>
    <text x="-40" y="95" font-family="Tahoma" font-size="12">تعادل</text>
    <text x="-40" y="115" font-family="Tahoma" font-size="12">δ &lt; 0</text>
  </g>
</svg>
