<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 250" width="100%" height="100%" style="background-color: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="50" y1="200" x2="310" y2="200" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="50" y1="200" x2="50" y2="20" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="315" y="204" font-family="Arial, sans-serif" font-size="14" font-weight="bold">X</text>
  <text x="45" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="end">Y</text>

  <!-- Budget lines (parallel with slope 0.625) -->
  <!-- Inner budget line (original) -->
  <line x1="50" y1="120" x2="178" y2="200" stroke="blue" stroke-width="2" />
  <!-- Outer budget line (income increased) -->
  <line x1="50" y1="60" x2="274" y2="200" stroke="red" stroke-width="2" />

  <!-- Indifference Curves -->
  <!-- U1 tangent to inner line at e1 (114, 160) -->
  <path d="M 70,105 Q 82,140 114,160 Q 146,180 190,185" fill="none" stroke="green" stroke-width="2" />
  <text x="195" y="190" font-family="Arial, sans-serif" font-size="12" fill="green" font-weight="bold">U1</text>

  <!-- U2 tangent to outer line at e2 (178, 140) -->
  <path d="M 115,80 Q 130,110 178,140 Q 226,170 260,172" fill="none" stroke="purple" stroke-width="2" />
  <text x="265" y="175" font-family="Arial, sans-serif" font-size="12" fill="purple" font-weight="bold">U2</text>

  <!-- Tangency points -->
  <circle cx="114" cy="160" r="3.5" fill="black" />
  <text x="110" y="152" font-family="Arial, sans-serif" font-size="12" font-weight="bold">e1</text>
  
  <circle cx="178" cy="140" r="3.5" fill="black" />
  <text x="174" y="132" font-family="Arial, sans-serif" font-size="12" font-weight="bold">e2</text>

  <!-- Income Expansion Path (ICC) -->
  <path d="M 50,200 C 75,185 95,170 114,160 C 135,150 155,145 178,140 C 200,135 220,130 240,125" fill="none" stroke="orange" stroke-width="2.5" />
  <text x="245" y="122" font-family="Arial, sans-serif" font-size="14" fill="orange" font-weight="bold">ICC</text>
</svg>