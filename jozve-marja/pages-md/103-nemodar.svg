<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black"/>
    </marker>
  </defs>
  <!-- Axes -->
  <line x1="50" y1="250" x2="350" y2="250" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="50" y1="250" x2="50" y2="50" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="360" y="255" font-family="Arial" font-size="14">Q</text>
  <text x="35" y="45" font-family="Arial" font-size="14">P</text>

  <!-- Curve d (flat) -->
  <line x1="70" y1="120" x2="300" y2="230" stroke="blue" stroke-width="2"/>
  <text x="310" y="235" fill="blue" font-family="Arial" font-size="16">d</text>

  <!-- Curve D (steep) -->
  <line x1="120" y1="80" x2="200" y2="240" stroke="red" stroke-width="2"/>
  <text x="100" y="75" fill="red" font-family="Arial" font-size="16">D</text>
</svg>
