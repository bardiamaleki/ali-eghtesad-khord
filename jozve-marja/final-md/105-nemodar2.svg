<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black"/>
    </marker>
  </defs>
  <!-- Axes -->
  <line x1="50" y1="250" x2="350" y2="250" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="50" y1="250" x2="50" y2="50" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="360" y="255" font-family="Arial" font-size="14">q_k</text>
  <text x="20" y="45" font-family="Arial" font-size="14">P_k</text>

  <!-- Curves -->
  <!-- d (flat) -->
  <line x1="60" y1="90" x2="260" y2="190" stroke="blue" stroke-width="2"/>
  <text x="270" y="200" fill="blue" font-family="Arial" font-size="14">d</text>

  <!-- D (steep) -->
  <line x1="110" y1="55" x2="170" y2="205" stroke="red" stroke-width="2"/>
  <text x="175" y="210" fill="red" font-family="Arial" font-size="14">D</text>

  <!-- MR (marginal revenue) -->
  <line x1="60" y1="95" x2="190" y2="225" stroke="green" stroke-width="2"/>
  <text x="195" y="230" fill="green" font-family="Arial" font-size="14">MR</text>

  <!-- LAC -->
  <path d="M 80 80 Q 150 162 220 134" fill="none" stroke="orange" stroke-width="2"/>
  <text x="225" y="130" fill="orange" font-family="Arial" font-size="14">LAC</text>

  <!-- MC / LMC -->
  <path d="M 80 210 Q 140 200 200 90" fill="none" stroke="purple" stroke-width="2"/>
  <text x="205" y="85" fill="purple" font-family="Arial" font-size="14">MC</text>

  <!-- Equilibrium lines -->
  <line x1="140" y1="130" x2="140" y2="250" stroke="black" stroke-dasharray="4"/>
  <line x1="50" y1="130" x2="140" y2="130" stroke="black" stroke-dasharray="4"/>
  <circle cx="140" cy="130" r="3" fill="black"/>
  <text x="20" y="135" font-family="Arial" font-size="14">P_E</text>
  <text x="132" y="265" font-family="Arial" font-size="14">q_e</text>
</svg>
