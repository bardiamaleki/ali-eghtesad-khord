<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 460" width="100%" height="100%" style="background-color: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
  </defs>

  <!-- ================= TOP GRAPH: PCC ================= -->
  <!-- Axes -->
  <line x1="50" y1="200" x2="310" y2="200" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="50" y1="200" x2="50" y2="20" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="315" y="204" font-family="Arial, sans-serif" font-size="14" font-weight="bold">X</text>
  <text x="45" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="end">Y</text>

  <!-- Budget lines -->
  <!-- Inner budget line (Px high) -->
  <line x1="50" y1="60" x2="190" y2="200" stroke="blue" stroke-width="2" />
  <!-- Outer budget line (Px low) -->
  <line x1="50" y1="60" x2="290" y2="200" stroke="red" stroke-width="2" />

  <!-- Indifference Curves -->
  <!-- U1 tangent to inner line at e1 (110, 120) -->
  <path d="M 70,75 Q 80,90 110,120 Q 140,150 170,160" fill="none" stroke="green" stroke-width="2" />
  <text x="175" y="165" font-family="Arial, sans-serif" font-size="11" fill="green" font-weight="bold">U1</text>

  <!-- U2 tangent to outer line at e2 (170, 130) -->
  <path d="M 110,80 Q 122,102 170,130 Q 218,158 240,163" fill="none" stroke="purple" stroke-width="2" />
  <text x="245" y="168" font-family="Arial, sans-serif" font-size="11" fill="purple" font-weight="bold">U2</text>

  <!-- PCC Curve -->
  <path d="M 110,120 Q 140,128 170,130" fill="none" stroke="orange" stroke-width="2.5" />
  <text x="180" y="125" font-family="Arial, sans-serif" font-size="12" fill="orange" font-weight="bold">PCC</text>

  <!-- Tangency points -->
  <circle cx="110" cy="120" r="3.5" fill="black" />
  <text x="105" y="112" font-family="Arial, sans-serif" font-size="11" font-weight="bold">e1</text>

  <circle cx="170" cy="130" r="3.5" fill="black" />
  <text x="165" y="122" font-family="Arial, sans-serif" font-size="11" font-weight="bold">e2</text>

  <!-- Horizontal dashed lines for Y1, Y2 -->
  <line x1="110" y1="120" x2="50" y2="120" stroke="gray" stroke-width="1" stroke-dasharray="3,3" />
  <text x="45" y="124" font-family="Arial, sans-serif" font-size="11" text-anchor="end">Y1</text>

  <line x1="170" y1="130" x2="50" y2="130" stroke="gray" stroke-width="1" stroke-dasharray="3,3" />
  <text x="45" y="134" font-family="Arial, sans-serif" font-size="11" text-anchor="end">Y2</text>


  <!-- ================= BOTTOM GRAPH: DEMAND ================= -->
  <!-- Axes -->
  <line x1="50" y1="420" x2="310" y2="420" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="50" y1="420" x2="50" y2="240" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="315" y="424" font-family="Arial, sans-serif" font-size="14" font-weight="bold">X</text>
  <text x="45" y="245" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="end">Px</text>

  <!-- Demand Curve (Normal Demand) -->
  <path d="M 80,285 Q 125,325 170,360 Q 215,395 240,400" fill="none" stroke="brown" stroke-width="2.5" />
  <text x="245" y="405" font-family="Arial, sans-serif" font-size="12" fill="brown" font-weight="bold">Demand</text>

  <!-- Demand Points -->
  <circle cx="110" cy="311" r="3.5" fill="black" />
  <text x="115" y="307" font-family="Arial, sans-serif" font-size="11" font-weight="bold">e1</text>

  <circle cx="170" cy="360" r="3.5" fill="black" />
  <text x="175" y="356" font-family="Arial, sans-serif" font-size="11" font-weight="bold">e2</text>

  <!-- Horizontal dashed lines for P1, P2 -->
  <line x1="110" y1="311" x2="50" y2="311" stroke="gray" stroke-width="1" stroke-dasharray="3,3" />
  <text x="45" y="315" font-family="Arial, sans-serif" font-size="11" text-anchor="end">P1</text>

  <line x1="170" y1="360" x2="50" y2="360" stroke="gray" stroke-width="1" stroke-dasharray="3,3" />
  <text x="45" y="364" font-family="Arial, sans-serif" font-size="11" text-anchor="end">P2</text>


  <!-- ================= CONNECTING LINES & X-LABELS ================= -->
  <!-- Vertical connecting dashed lines -->
  <line x1="110" y1="120" x2="110" y2="420" stroke="gray" stroke-width="1" stroke-dasharray="4,4" />
  <text x="110" y="435" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">X1</text>
  <line x1="110" y1="197" x2="110" y2="203" stroke="black" stroke-width="1.5" />
  <text x="110" y="214" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">X1</text>

  <line x1="170" y1="130" x2="170" y2="420" stroke="gray" stroke-width="1" stroke-dasharray="4,4" />
  <text x="170" y="435" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">X2</text>
  <line x1="170" y1="197" x2="170" y2="203" stroke="black" stroke-width="1.5" />
  <text x="170" y="214" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">X2</text>
</svg>