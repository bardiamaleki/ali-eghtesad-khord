<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%" style="background-color: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="40" y1="360" x2="380" y2="360" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="40" y1="360" x2="40" y2="20" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <!-- Axis labels -->
  <text x="385" y="365" font-family="Arial, sans-serif" font-size="14" font-weight="bold">L</text>
  <text x="25" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold">K</text>

  <!-- Isocost lines (Blue, parallel with slope 1.0) -->
  <line x1="40" y1="200" x2="200" y2="360" stroke="blue" stroke-width="1.5" />
  <line x1="40" y1="40" x2="360" y2="360" stroke="blue" stroke-width="1.5" />

  <!-- Isoquants (Red, tangent to isocost lines) -->
  <path d="M 80,210 Q 100,260 140,300 Q 180,340 230,345" fill="none" stroke="red" stroke-width="2" />
  <path d="M 150,130 Q 180,180 240,240 Q 300,300 340,305" fill="none" stroke="red" stroke-width="2" />
  
  <!-- Labels for Q -->
  <text x="240" y="350" font-family="Arial, sans-serif" font-size="14" fill="red" font-weight="bold">Q</text>
  <text x="350" y="310" font-family="Arial, sans-serif" font-size="14" fill="red" font-weight="bold">Q'</text>

  <!-- Dashed lines connecting tangency points to axes -->
  <!-- For e (140, 300) -->
  <line x1="140" y1="300" x2="140" y2="360" stroke="black" stroke-width="1" stroke-dasharray="3,3" />
  <line x1="140" y1="300" x2="40" y2="300" stroke="black" stroke-width="1" stroke-dasharray="3,3" />
  
  <!-- For e' (240, 240) -->
  <line x1="240" y1="240" x2="240" y2="360" stroke="black" stroke-width="1" stroke-dasharray="3,3" />
  <line x1="240" y1="240" x2="40" y2="240" stroke="black" stroke-width="1" stroke-dasharray="3,3" />

  <!-- Tangency points -->
  <circle cx="140" cy="300" r="4" fill="black" />
  <circle cx="240" cy="240" r="4" fill="black" />

  <!-- Point labels -->
  <text x="145" y="295" font-family="Arial, sans-serif" font-size="14" font-style="italic">e</text>
  <text x="245" y="235" font-family="Arial, sans-serif" font-size="14" font-style="italic">e'</text>

  <!-- Axis ticks and labels -->
  <!-- L1, L2 -->
  <line x1="140" y1="357" x2="140" y2="363" stroke="black" stroke-width="1.5" />
  <text x="140" y="378" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">L1</text>
  
  <line x1="240" y1="357" x2="240" y2="363" stroke="black" stroke-width="1.5" />
  <text x="240" y="378" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">L2</text>
  
  <!-- K1, K2 -->
  <line x1="37" y1="300" x2="43" y2="300" stroke="black" stroke-width="1.5" />
  <text x="30" y="304" font-family="Arial, sans-serif" font-size="12" text-anchor="end">K1</text>
  
  <line x1="37" y1="240" x2="43" y2="240" stroke="black" stroke-width="1.5" />
  <text x="30" y="244" font-family="Arial, sans-serif" font-size="12" text-anchor="end">K2</text>

  <!-- Expansion path (collinear line from origin) -->
  <line x1="40" y1="360" x2="310" y2="198" stroke="black" stroke-width="2.5" />
  <!-- Text along expansion path -->
  <text x="260" y="190" font-family="Arial, sans-serif" font-size="12" font-weight="bold">مسیر توسعه</text>
</svg>
