<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" width="100%" height="100%">
  <!-- Left Graph -->
  <line x1="50" y1="200" x2="50" y2="20" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="50" y1="200" x2="200" y2="200" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="35" y="30" font-family="Arial" font-size="14">Y</text>
  <text x="210" y="205" font-family="Arial" font-size="14">X</text>
  
  <line x1="50" y1="110" x2="125" y2="200" stroke="red" stroke-width="1.5" />
  <line x1="50" y1="50" x2="175" y2="200" stroke="red" stroke-width="1.5" />

  <!-- Right Graph -->
  <line x1="280" y1="200" x2="280" y2="20" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="280" y1="200" x2="450" y2="200" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="260" y="30" font-family="Arial" font-size="14">P&#x2093;</text>
  <text x="460" y="205" font-family="Arial" font-size="14">X</text>

  <line x1="280" y1="100" x2="350" y2="100" stroke="blue" stroke-width="1.5" />
  <line x1="350" y1="100" x2="350" y2="200" stroke="blue" stroke-width="1.5" />
  
  <text x="245" y="105" font-family="Arial" font-size="14" fill="red">P*</text>
  <line x1="280" y1="100" x2="248" y2="100" stroke="red" stroke-dasharray="4" stroke-width="0.5" />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="black" />
    </marker>
  </defs>
</svg>
