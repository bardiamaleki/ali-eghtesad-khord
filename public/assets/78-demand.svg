<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="40" y1="260" x2="380" y2="260" stroke="black" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="40" y1="260" x2="40" y2="20" stroke="black" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Axis labels -->
  <text x="380" y="280" font-family="Arial" font-size="16" font-style="italic">Q</text>
  <text x="15" y="30" font-family="Arial" font-size="16" font-style="italic">P</text>

  <!-- Price / MR / AR Line (Horizontal) -->
  <line x1="40" y1="160" x2="250" y2="160" stroke="red" stroke-width="2" />
  
  <!-- Labels -->
  <text x="260" y="165" font-family="Arial" font-size="14" fill="red" text-anchor="start">P = AR = MR = d</text>
</svg>
