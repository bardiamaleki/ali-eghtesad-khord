<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="black" />
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="40" y1="180" x2="280" y2="180" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="40" y1="180" x2="40" y2="15" stroke="black" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <!-- Axis Labels -->
  <text x="25" y="25" font-family="Arial" font-size="14" font-weight="bold">Y</text>
  <text x="285" y="185" font-family="Arial" font-size="14" font-weight="bold">X</text>
  
  <!-- Indifference Curve (strictly convex, downward-sloping) -->
  <path d="M 60 50 Q 90 150 250 150" stroke="blue" stroke-width="2" fill="none" />
  
  <!-- Point A (exactly on the curve) -->
  <circle cx="77.2" cy="86.0" r="3.5" fill="black" />
  <text x="83" y="81" font-family="Arial" font-size="14" font-weight="bold">A</text>
  
  <!-- Point B (exactly on the curve) -->
  <circle cx="165.7" cy="141.0" r="3.5" fill="black" />
  <text x="171" y="136" font-family="Arial" font-size="14" font-weight="bold">B</text>
</svg>