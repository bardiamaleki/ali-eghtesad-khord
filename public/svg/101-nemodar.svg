<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Axes -->
  <line x1="50" y1="350" x2="450" y2="350" stroke="#f1f5f9" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="50" y1="350" x2="50" y2="50" stroke="#f1f5f9" stroke-width="2" marker-end="url(#arrow)" />
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f1f5f9" />
    </marker>
  </defs>
  
  <text x="460" y="355" font-family="Arial" font-size="16" fill="#f1f5f9">x</text>
  <text x="50" y="40" font-family="Arial" font-size="16" text-anchor="middle" fill="#f1f5f9">r</text>
  <text x="35" y="365" font-family="Arial" font-size="16" fill="#f1f5f9">O</text>
  
  <!-- Supply and MFC -->
  <!-- r = g(x) -->
  <line x1="50" y1="290" x2="370" y2="130" stroke="blue" stroke-width="2" />
  <text x="380" y="135" font-family="Arial" fill="blue" font-size="16">r = g(x)</text>
  
  <!-- MFC_x -->
  <line x1="50" y1="290" x2="250" y2="90" stroke="red" stroke-width="2" />
  <text x="260" y="95" font-family="Arial" fill="red" font-size="16">MFC_x</text>
  
  <!-- Demand curves VMP and MRP -->
  <!-- VMP_x -->
  <line x1="50" y1="90" x2="370" y2="250" stroke="red" stroke-width="2" />
  <text x="380" y="255" font-family="Arial" fill="red" font-size="16">VMP_x</text>
  
  <!-- MRP_x -->
  <line x1="50" y1="130" x2="270" y2="350" stroke="blue" stroke-width="2" />
  <text x="280" y="355" font-family="Arial" fill="blue" font-size="16">MRP_x</text>
  
  <!-- Point EC (Intersection of VMP_x and r = g(x)) -->
  <circle cx="250" cy="190" r="4" fill="red" />
  <text x="258" y="185" font-family="Arial" fill="red" font-size="16">E_C</text>
  <line x1="250" y1="350" x2="250" y2="190" stroke="#f1f5f9" stroke-dasharray="4" />
  <text x="242" y="370" font-family="Arial" font-size="16" fill="#f1f5f9">x_C</text>
  
  <!-- Point EM (Intersection of MRP_x and MFC_x) -->
  <circle cx="130" cy="210" r="4" fill="red" />
  <text x="100" y="205" font-family="Arial" fill="red" font-size="16">E_M</text>
  <line x1="130" y1="350" x2="130" y2="210" stroke="#f1f5f9" stroke-dasharray="4" />
  <text x="122" y="370" font-family="Arial" font-size="16" fill="#f1f5f9">x_M</text>
  
  <line x1="50" y1="210" x2="130" y2="210" stroke="#f1f5f9" stroke-dasharray="4" />
  <text x="25" y="215" font-family="Arial" fill="#f1f5f9" font-size="16">r_1</text>
  
  <!-- Wage paid in monopsony: go down from EM to r=g(x) -->
  <circle cx="130" cy="250" r="4" fill="#f1f5f9" />
  <line x1="50" y1="250" x2="130" y2="250" stroke="#f1f5f9" stroke-dasharray="4" />
  <text x="25" y="255" font-family="Arial" fill="#f1f5f9" font-size="16">r_2</text>
  
</svg>
