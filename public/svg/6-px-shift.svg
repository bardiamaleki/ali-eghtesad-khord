<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 250" width="100%" height="100%" style="background-color: transparent;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f1f5f9" />
    </marker>
    <marker id="red-arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171" />
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="50" y1="200" x2="310" y2="200" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="50" y1="200" x2="50" y2="30" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
  <text fill="#f1f5f9" x="315" y="204" font-family="Arial, sans-serif" font-size="14" font-weight="bold">X</text>
  <text fill="#f1f5f9" x="45" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="end">Y</text>

  <!-- Vertical Intercept Label -->
  <text fill="#f1f5f9" x="45" y="55" font-family="Arial, sans-serif" font-size="12" text-anchor="end" font-weight="bold">I/Py</text>

  <!-- Budget lines -->
  <!-- Middle budget line (original) -->
  <line x1="50" y1="50" x2="200" y2="200" stroke="#60a5fa" stroke-width="2" />
  <text fill="#f1f5f9" x="200" y="218" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" font-weight="bold">I/Px</text>

  <!-- Inner budget line (Px increased) -->
  <line x1="50" y1="50" x2="130" y2="200" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,4" />

  <!-- Outer budget line (Px decreased) -->
  <line x1="50" y1="50" x2="270" y2="200" stroke="#4ade80" stroke-width="1.5" />

  <!-- Shift arrows -->
  <!-- Shift left (red) -->
  <line x1="125" y1="125" x2="95" y2="137" stroke="#f87171" stroke-width="1.5" marker-end="url(#red-arrow)" />
  
  <!-- Shift right (black/green) -->
  <line x1="125" y1="125" x2="160" y2="113" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
</svg>