<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 680" width="100%" height="100%" style="background-color: white;">
  <!-- Definitions for markers/arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f1f5f9" />
    </marker>
  </defs>

  <!-- Top diagram: TP -->
  <g transform="translate(0, 0)">
    <!-- Axes -->
    <line x1="80" y1="200" x2="500" y2="200" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="80" y1="200" x2="80" y2="40" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
    <text x="510" y="204" font-family="Arial, sans-serif" font-size="14" font-weight="bold">L</text>
    <text x="75" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="end">Q</text>
    
    <!-- TP Curve -->
    <path d="M 80,200 C 130,200 160,140 200,120 C 240,100 280,70 320,70 C 360,70 395,95 420,125" fill="none" stroke="red" stroke-width="2" />
    <text x="430" y="135" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="red">TP</text>
    
    <!-- Tangent line at inflection point -->
    <line x1="80" y1="200" x2="260" y2="80" stroke="pink" stroke-width="1.5" />
    
    <!-- Points and vertical dashed lines -->
    <!-- Peak Point -->
    <circle cx="320" cy="70" r="4" fill="#f1f5f9" />
    <text x="320" y="55" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">max</text>
    <line x1="320" y1="70" x2="320" y2="200" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="4,4" />

    <!-- Inflection Point -->
    <circle cx="200" cy="120" r="4" fill="#f1f5f9" />
  </g>
  
  <!-- Middle diagram: MP -->
  <g transform="translate(0, 220)">
    <!-- Axes -->
    <line x1="80" y1="200" x2="500" y2="200" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="80" y1="240" x2="80" y2="40" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
    <text x="510" y="204" font-family="Arial, sans-serif" font-size="14" font-weight="bold">L</text>
    <text x="75" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="end" fill="red">MP</text>
    
    <!-- MP_L Curve -->
    <path d="M 80,200 C 120,100 160,100 200,100 C 240,100 280,150 320,200 C 340,225 360,230 380,230" fill="none" stroke="blue" stroke-width="2" />
    <text x="390" y="235" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="blue">MP_L</text>
    
    <!-- Peak Point -->
    <circle cx="200" cy="100" r="4" fill="red" />
    <text x="200" y="85" font-family="Arial, sans-serif" font-size="12" fill="red" text-anchor="middle">max</text>
    
    <!-- Tick for L1 -->
    <line x1="200" y1="195" x2="200" y2="205" stroke="#f1f5f9" stroke-width="1.5" />
    <text x="200" y="220" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">L1</text>
  </g>
  
  <!-- Bottom diagram: MC -->
  <g transform="translate(0, 470)">
    <!-- Axes -->
    <line x1="80" y1="130" x2="500" y2="130" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="80" y1="130" x2="80" y2="10" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
    <text x="510" y="134" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Q</text>
    <text x="75" y="10" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="end" fill="red">MC</text>
    
    <!-- MC Curve -->
    <path d="M 100,60 C 130,110 170,110 200,110 C 240,110 290,80 340,40" fill="none" stroke="red" stroke-width="2" />
    <text x="350" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="red">MC</text>
    
    <!-- Min Point -->
    <circle cx="200" cy="110" r="4" fill="red" />
    
    <!-- Tick for Q1 -->
    <line x1="200" y1="125" x2="200" y2="135" stroke="#f1f5f9" stroke-width="1.5" />
    <text x="200" y="150" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Q1</text>
    
    <!-- Explanatory Persian text -->
    <text x="200" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">نقطه شروع بازده نزولی</text>
    <text x="200" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">max MP_L = min MC</text>
  </g>

  <!-- Connecting dashed lines across diagrams -->
  <!-- Line 1 (Inflection point to Min MC) -->
  <line x1="200" y1="120" x2="200" y2="580" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="4,4" />
  
  <!-- Line 2 (Peak TP to MP crossing) -->
  <line x1="320" y1="200" x2="320" y2="420" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="4,4" />
</svg>
