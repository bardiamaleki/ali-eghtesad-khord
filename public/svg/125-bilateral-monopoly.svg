<svg width="450" height="350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#f1f5f9" />
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="50" y1="250" x2="410" y2="250" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="50" y1="250" x2="50" y2="10" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <!-- Axis Labels -->
  <text x="35" y="15" fill="#f1f5f9" font-family="Arial" font-size="12" font-weight="bold">P</text>
  <text x="415" y="255" fill="#f1f5f9" font-family="Arial" font-size="12" font-weight="bold">q</text>

  <!-- Curves -->
  <!-- VMP (Inverse Demand) -->
  <line x1="50" y1="10" x2="350" y2="250" stroke="#64b5f6" stroke-width="1.5" />
  <text x="355" y="235" fill="#64b5f6" font-family="Arial" font-size="11" font-weight="bold">VMP (معکوس تقاضا)</text>
  
  <!-- MR -->
  <line x1="50" y1="10" x2="200" y2="250" stroke="#64b5f6" stroke-dasharray="4" stroke-width="1.5" />
  <text x="202" y="240" fill="#64b5f6" font-family="Arial" font-size="11" font-weight="bold">MR</text>

  <!-- MC (Seller's MC / Supply) -->
  <line x1="50" y1="250" x2="350" y2="70" stroke="#ff5252" stroke-width="1.5" />
  <text x="355" y="70" fill="#ff5252" font-family="Arial" font-size="11" font-weight="bold">MC (هزینه نهایی)</text>
  
  <!-- MFC (Buyer's MFC) -->
  <line x1="50" y1="250" x2="146" y2="10" stroke="#ff5252" stroke-dasharray="4" stroke-width="1.5" />
  <text x="120" y="25" fill="#ff5252" font-family="Arial" font-size="11" font-weight="bold">MFC (معکوس عرضه)</text>

  <!-- Points and dashed lines -->
  
  <!-- B (Monopsony Point) -->
  <circle cx="122.7" cy="206.4" r="3.5" fill="#f1f5f9" />
  <text x="110" y="212" fill="#f1f5f9" font-family="Arial" font-size="11" font-weight="bold">B</text>
  
  <!-- E_B (Buyer's equilibrium where MFC = VMP) -->
  <circle cx="122.7" cy="68.2" r="3.5" fill="#f1f5f9" />
  <text x="128" y="65" fill="#f1f5f9" font-family="Arial" font-size="11" font-weight="bold">E<tspan font-size="8" baseline-shift="sub">B</tspan></text>
  
  <!-- Dashed lines for monopsony -->
  <line x1="122.7" y1="250" x2="122.7" y2="68.2" stroke="#b0bec5" stroke-dasharray="3" />
  <line x1="50" y1="206.4" x2="122.7" y2="206.4" stroke="#b0bec5" stroke-dasharray="3" />
  <text x="112" y="265" fill="#f1f5f9" font-family="Arial" font-size="11">q<tspan font-size="8" baseline-shift="sub">B</tspan></text>
  <text x="20" y="210" fill="#f1f5f9" font-family="Arial" font-size="11">P<tspan font-size="8" baseline-shift="sub">B</tspan></text>

  <!-- S (Monopoly Point) -->
  <circle cx="159.1" cy="97.3" r="3.5" fill="#f1f5f9" />
  <text x="165" y="93" fill="#f1f5f9" font-family="Arial" font-size="11" font-weight="bold">S</text>
  
  <!-- E_S (Seller's equilibrium where MR = MC) -->
  <circle cx="159.1" cy="184.5" r="3.5" fill="#f1f5f9" />
  <text x="165" y="193" fill="#f1f5f9" font-family="Arial" font-size="11" font-weight="bold">E<tspan font-size="8" baseline-shift="sub">S</tspan></text>
  
  <!-- Dashed lines for monopoly -->
  <line x1="159.1" y1="250" x2="159.1" y2="97.3" stroke="#b0bec5" stroke-dasharray="3" />
  <line x1="50" y1="97.3" x2="159.1" y2="97.3" stroke="#b0bec5" stroke-dasharray="3" />
  <text x="150" y="265" fill="#f1f5f9" font-family="Arial" font-size="11">q<tspan font-size="8" baseline-shift="sub">S</tspan></text>
  <text x="20" y="101" fill="#f1f5f9" font-family="Arial" font-size="11">P<tspan font-size="8" baseline-shift="sub">S</tspan></text>

  <!-- C (Competitive Point) -->
  <circle cx="221.4" cy="147.2" r="3.5" fill="#f1f5f9" />
  <text x="228" y="143" fill="#f1f5f9" font-family="Arial" font-size="11" font-weight="bold">C</text>
  
  <!-- Dashed lines for competition -->
  <line x1="221.4" y1="250" x2="221.4" y2="147.2" stroke="#b0bec5" stroke-dasharray="3" />
  <line x1="50" y1="147.2" x2="221.4" y2="147.2" stroke="#b0bec5" stroke-dasharray="3" />
  <text x="212" y="265" fill="#f1f5f9" font-family="Arial" font-size="11">q<tspan font-size="8" baseline-shift="sub">C</tspan></text>
  <text x="20" y="151" fill="#f1f5f9" font-family="Arial" font-size="11">P<tspan font-size="8" baseline-shift="sub">C</tspan></text>
</svg>
