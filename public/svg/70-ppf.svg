<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f1f5f9" />
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="40" y1="360" x2="380" y2="360" stroke="#f1f5f9" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="40" y1="360" x2="40" y2="20" stroke="#f1f5f9" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Axis labels -->
  <text x="380" y="380" font-family="Arial" font-size="16" font-style="italic">q1</text>
  <text x="15" y="30" font-family="Arial" font-size="16" font-style="italic">q2</text>

  <!-- PPF Curves (Concave to origin) -->
  <path d="M 40 280 A 240 80 0 0 1 280 360" fill="none" stroke="blue" stroke-width="2" />
  <path d="M 40 200 A 300 160 0 0 1 340 360" fill="none" stroke="blue" stroke-width="2" />

  <!-- Intersection Dots -->
  <circle cx="40" cy="280" r="4" fill="#f1f5f9" />
  <circle cx="280" cy="360" r="4" fill="#f1f5f9" />
  <circle cx="40" cy="200" r="4" fill="#f1f5f9" />
  <circle cx="340" cy="360" r="4" fill="#f1f5f9" />
</svg>
