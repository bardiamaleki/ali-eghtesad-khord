<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .axis { stroke: #f1f5f9; stroke-width: 1.5; fill: none; }
    .line-blue { stroke: blue; stroke-width: 2; fill: none; }
    .line-red { stroke: red; stroke-width: 2; fill: none; }
    .line-black { stroke: #f1f5f9; stroke-width: 2; fill: none; }
    .dashed { stroke-dasharray: 5,5; fill: none; }
    text { font-family: Tahoma, sans-serif; font-size: 14px; }
  </style>

  <g transform="translate(60, 50)">
    <!-- Axes -->
    <line x1="0" y1="300" x2="480" y2="300" class="axis" />
    <line x1="0" y1="300" x2="0" y2="0" class="axis" />
    <text x="-20" y="20" fill="#f1f5f9">P</text>
    <text x="490" y="305" fill="#f1f5f9">Q</text>
    
    <!-- P = MR = AR -->
    <line x1="0" y1="200" x2="450" y2="200" class="line-blue" />
    <text x="-25" y="205" fill="#f1f5f9">P̄</text>
    <text x="260" y="225" fill="blue">P̄ = MR = AR</text>
    
    <!-- LAC Curve -->
    <path d="M 80 100 Q 200 300 320 100" class="line-blue" />
    <text x="325" y="110" fill="blue">LAC</text>
    
    <!-- LMC Curve -->
    <path d="M 70 260 Q 188.6 295.3 250 80" class="line-red" />
    <text x="255" y="75" fill="red">LMC</text>
    
    <!-- SAC Curve -->
    <path d="M 130 100 Q 200 300 270 100" class="line-blue" style="stroke-width:1.5;" />
    <text x="275" y="110" fill="blue">SAC</text>
    
    <!-- SMC Curve -->
    <path d="M 130 260 Q 185.8 327.1 225 80" class="line-black" style="stroke-width:1.5;" />
    <text x="230" y="75" fill="#f1f5f9">SMC</text>
    
    <!-- Intersection Point -->
    <circle cx="200" cy="200" r="4" fill="#f1f5f9" />
    
    <!-- Notes on the right -->
    <text x="310" y="130" font-family="Tahoma" font-size="12" fill="#f1f5f9">در این مورد در کوتاه مدت و بلند مدت</text>
    <text x="310" y="155" font-family="Tahoma" font-size="12" fill="#f1f5f9">P و Q یکسان است.</text>
    <text x="310" y="180" font-family="Tahoma" font-size="12" fill="#f1f5f9">و در بلند مدت سود صفر است.</text>
  </g>
</svg>
