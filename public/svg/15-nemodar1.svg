<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" width="100%" height="100%">
  <!-- Left Graph -->
  <line x1="50" y1="200" x2="50" y2="20" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="50" y1="200" x2="200" y2="200" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
  <text fill="#f1f5f9" x="35" y="30" font-family="Arial" font-size="14">Y</text>
  <text fill="#f1f5f9" x="210" y="205" font-family="Arial" font-size="14">X</text>
  
  <path d="M 60 100 Q 80 160 140 170" fill="none" stroke="#f87171" stroke-width="1.5" />
  <path d="M 70 70 Q 110 130 180 140" fill="none" stroke="#f87171" stroke-width="1.5" />
  <path d="M 80 40 Q 140 100 200 110" fill="none" stroke="#f87171" stroke-width="1.5" />

  <!-- Right Graph -->
  <line x1="280" y1="200" x2="280" y2="20" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="280" y1="200" x2="450" y2="200" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
  <text fill="#f1f5f9" x="260" y="30" font-family="Arial" font-size="14">P&#x2093;</text>
  <text fill="#f1f5f9" x="460" y="205" font-family="Arial" font-size="14">X</text>

  <line x1="300" y1="50" x2="400" y2="180" stroke="#4ade80" stroke-width="1.5" />
  
  <!-- Dashed lines -->
  <line x1="280" y1="100" x2="338" y2="100" stroke="#f1f5f9" stroke-dasharray="4" stroke-width="0.5" />
  <line x1="338" y1="100" x2="338" y2="200" stroke="#f1f5f9" stroke-dasharray="4" stroke-width="0.5" />
  <text fill="#f1f5f9" x="248" y="105" font-family="Arial" font-size="12">P&#x2093;&#x2081;</text>
  <text fill="#f1f5f9" x="330" y="215" font-family="Arial" font-size="12">X&#x2081;</text>

  <line x1="280" y1="150" x2="377" y2="150" stroke="#f1f5f9" stroke-dasharray="4" stroke-width="0.5" />
  <line x1="377" y1="150" x2="377" y2="200" stroke="#f1f5f9" stroke-dasharray="4" stroke-width="0.5" />
  <text fill="#f1f5f9" x="248" y="155" font-family="Arial" font-size="12">P&#x2093;&#x2082;</text>
  <text fill="#f1f5f9" x="370" y="215" font-family="Arial" font-size="12">X&#x2082;</text>

  <!-- Intersection points -->
  <circle cx="338" cy="100" r="2.5" fill="#f1f5f9" />
  <circle cx="377" cy="150" r="2.5" fill="#f1f5f9" />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f1f5f9" />
    </marker>
  </defs>
</svg>
