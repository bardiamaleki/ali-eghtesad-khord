  <line x1="50" y1="160" x2="260" y2="300" stroke="#f1f5f9" stroke-dasharray="5,5" stroke-width="1.5" />
  
  <path d="M 70 120 C 80 140 95 160 110 180 C 125 200 145 223 170 240 C 200 260 230 265 270 270" fill="transparent" stroke="#60a5fa" stroke-width="1.5" />
  <path d="M 100 110 C 130 140 180 187 230 220 C 260 240 310 246 380 250" fill="transparent" stroke="#60a5fa" stroke-width="1.5" />
  
  <circle cx="110" cy="180" r="4" fill="#f1f5f9" />
