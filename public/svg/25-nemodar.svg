  <line x1="50" y1="600" x2="450" y2="600" stroke="#f1f5f9" stroke-width="1.5" marker-end="url(#arrow)" />
  <text fill="#f1f5f9" x="30" y="360" font-family="Arial" font-size="16">P</text>
  <text fill="#f1f5f9" x="460" y="615" font-family="Arial" font-size="16">X</text>
  
