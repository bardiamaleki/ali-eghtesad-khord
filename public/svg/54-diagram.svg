<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <pattern id="diagonalHatch" width="10" height="10" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#ddd" stroke-width="2" />
    </pattern>
  </defs>

  <style>
    .axis-label { font-family: 'Arial', sans-serif; font-size: 14px; fill: black; }
    .curve-label { font-family: 'Arial', sans-serif; font-size: 13px; font-weight: bold; }
    .stage-title { font-family: 'Vazir', 'Arial', sans-serif; font-size: 12px; font-weight: bold; fill: black; text-anchor: middle; }
    .stage-desc { font-family: 'Vazir', 'Arial', sans-serif; font-size: 11px; fill: red; text-anchor: middle; }
    .stage-desc-blue { font-family: 'Vazir', 'Arial', sans-serif; font-size: 11px; fill: blue; text-anchor: middle; }
    .point-label { font-family: 'Arial', sans-serif; font-size: 12px; fill: #f1f5f9; }
  </style>

  <!-- Regions Hatching (Stage 2) -->
  <rect x="250" y="50" width="150" height="300" fill="url(#diagonalHatch)" />
  <text x="325" y="180" font-family="Vazir, Arial, sans-serif" font-size="14" fill="#444" font-weight="bold" text-anchor="middle">مرحله اقتصادی</text>

  <!-- Axes -->
  <line x1="50" y1="350" x2="560" y2="350" stroke="#f1f5f9" stroke-width="2" /> <!-- L axis -->
  <line x1="50" y1="350" x2="50" y2="50" stroke="#f1f5f9" stroke-width="2" /> <!-- Y axis -->
  
  <text x="570" y="355" class="axis-label">L</text>
  <text x="25" y="40" class="axis-label" font-weight="bold">TP, AP, MP</text>
  
  <!-- Curves -->
  <!-- TP Curve (green) -->
  <path d="M 50,350 C 150,350 200,50 400,100 C 450,110 500,150 550,250" fill="none" stroke="green" stroke-width="2.5" />
  <text x="510" y="210" class="curve-label" fill="green">TP_L</text>

  <!-- APL Curve (blue) -->
  <path d="M 50,350 C 100,250 200,250 250,250 C 350,250 450,320 550,340" fill="none" stroke="blue" stroke-width="2.5" />
  <text x="510" y="325" class="curve-label" fill="blue">AP_L</text>

  <!-- MPL Curve (red) -->
  <path d="M 50,350 C 100,150 150,150 200,200 C 220,220 240,240 250,250 C 300,300 350,350 400,350 C 450,350 480,380 500,400" fill="none" stroke="red" stroke-width="2.5" />
  <text x="125" y="195" class="curve-label" fill="red">MP_L</text>
  <text x="460" y="390" class="curve-label" fill="red" font-size="11">MP_L &lt; 0</text>

  <!-- Points and Lines -->
  <!-- Max APL -->
  <circle cx="250" cy="250" r="4.5" fill="#f1f5f9" />
  <line x1="250" y1="250" x2="250" y2="350" stroke="#f1f5f9" stroke-dasharray="4,4" />
  <text x="245" y="365" class="axis-label">L₁</text>
  <text x="255" y="240" class="point-label" font-weight="bold">max AP_L</text>

  <!-- Max TP (MP=0) -->
  <circle cx="400" cy="100" r="4.5" fill="#f1f5f9" />
  <line x1="400" y1="100" x2="400" y2="350" stroke="#f1f5f9" stroke-dasharray="4,4" />
  <text x="395" y="365" class="axis-label">L₂</text>
  <text x="408" y="95" class="point-label" font-weight="bold">max TP_L</text>

  <!-- Brackets and Labels at the Bottom -->
  <!-- Stage 1 Bracket -->
  <path d="M 50,375 L 50,380 L 150,380 L 150,385 L 150,380 L 250,380 L 250,375" fill="none" stroke="#f1f5f9" stroke-width="1.2" />
  <text x="150" y="402" class="stage-title">مرحله اول</text>
  <text x="150" y="418" class="stage-desc">توقف ممنوع</text>

  <!-- Stage 2 Bracket -->
  <path d="M 250,375 L 250,380 L 325,380 L 325,385 L 325,380 L 400,380 L 400,375" fill="none" stroke="#f1f5f9" stroke-width="1.2" />
  <text x="325" y="402" class="stage-title">مرحله دوم</text>
  <text x="325" y="418" class="stage-desc-blue">ناحیه تولید</text>

  <!-- Stage 3 Bracket -->
  <path d="M 400,375 L 400,380 L 475,380 L 475,385 L 475,380 L 550,380 L 550,375" fill="none" stroke="#f1f5f9" stroke-width="1.2" />
  <text x="475" y="402" class="stage-title">مرحله سوم</text>
  <text x="475" y="418" class="stage-desc">ورود ممنوع</text>
</svg>
