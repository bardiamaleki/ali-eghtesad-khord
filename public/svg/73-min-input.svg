<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f1f5f9" />
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="40" y1="360" x2="380" y2="360" stroke="#f1f5f9" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="40" y1="360" x2="40" y2="20" stroke="#f1f5f9" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Axis labels -->
  <text x="380" y="380" font-family="Arial" font-size="16" font-style="italic">q1</text>
  <text x="15" y="30" font-family="Arial" font-size="16" font-style="italic">q2</text>

  <!-- Isorevenue line (Blue, slope 1.0) -->
  <line x1="40" y1="91" x2="309" y2="360" stroke="blue" stroke-width="2" />
  <text x="315" y="380" font-family="Arial" font-size="14" font-style="italic" text-anchor="middle">TR</text>

  <!-- PPF Curves (Concave to origin, nested, not crossing) (Red) -->
  <!-- Outer PPF (Tangent to blue line at 189, 240) -->
  <path d="M 40 180 A 200 180 0 0 1 240 360" fill="none" stroke="red" stroke-width="2" />
  <!-- Inner PPF -->
  <path d="M 40 240 A 140 120 0 0 1 180 360" fill="none" stroke="red" stroke-width="2" />

  <!-- Tangency point on the outer PPF -->
  <circle cx="189" cy="240" r="4" fill="#f1f5f9" />

  <!-- Coordinates of tangency -->
  <line x1="189" y1="240" x2="189" y2="360" stroke="#f1f5f9" stroke-dasharray="4" />
  <line x1="189" y1="240" x2="40" y2="240" stroke="#f1f5f9" stroke-dasharray="4" />
  
  <text x="189" y="380" font-family="Arial" font-size="14" font-style="italic" text-anchor="middle">q1*</text>
  <text x="35" y="245" font-family="Arial" font-size="14" font-style="italic" text-anchor="end">q2*</text>
</svg>
